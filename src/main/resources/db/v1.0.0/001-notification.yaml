databaseChangeLog:
  - changeSet:
      id: notification-001
      author: caiopinho
      changes:
        - createTable:
            tableName: tb_notification_history
            columns:
              - column: {name: co_seq_notification, type: BIGINT, autoIncrement: true, constraints: {primaryKey: true, nullable: false}}
              - column: {name: co_job, type: BIGINT, constraints: {nullable: false, unique: true}}
              - column: {name: co_user, type: BIGINT, constraints: {nullable: false}}
              - column: {name: co_plan, type: BIGINT, constraints: {nullable: false}}
              - column: {name: no_title, type: varchar(255), constraints: {nullable: false}}
              - column: {name: dt_sent_at, type: timestamp, constraints: {nullable: false}}
